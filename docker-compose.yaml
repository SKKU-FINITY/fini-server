version: '3.8'

networks:
  fini-network:
    driver: bridge
    name: fini-network

services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - fini-network
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.finiapp.tech`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=web"

  fini-server:
    image: ysjjw2003/fini:latest
    container_name: fini-server
    environment:
      - TZ=Asia/Seoul
    networks:
      - fini-network
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fini-router.rule=Host(`api.finiapp.tech`)"
      - "traefik.http.routers.fini-router.entrypoints=web"
      - "traefik.http.routers.fini-router.service=fini-service"
      - "traefik.http.services.fini-service.loadbalancer.server.port=8080"